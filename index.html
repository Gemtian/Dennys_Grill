<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dennys Grill</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0d0d0d;
    }
    body {
      display: grid;
      place-items: center;
      padding: 12px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .poster {
      position: relative;
      width: min(100vw, 430px);
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: #111;
      box-shadow: 0 20px 56px rgba(0,0,0,.48);
      isolation: isolate;
    }

    .full {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      display: block;
    }

    .bg { z-index: 1; }

    /* humo y fuego: estos PNG ya vienen colocados en el canvas completo */
    .smoke-back {
      z-index: 2;
      mix-blend-mode: multiply;
      opacity: .96;
      animation: smokeA 11s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }
    .embers {
      z-index: 3;
      mix-blend-mode: multiply;
      opacity: .98;
      animation: embers 3s ease-in-out infinite;
    }
    .fire-mid {
      z-index: 4;
      mix-blend-mode: multiply;
      opacity: .96;
      animation: fireA 1.9s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }
    .fire-front {
      z-index: 5;
      mix-blend-mode: multiply;
      opacity: .96;
      animation: fireB 1.25s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }
    .smoke-front {
      z-index: 6;
      mix-blend-mode: multiply;
      opacity: .96;
      animation: smokeB 8.5s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }

    .steak { z-index: 7; }
    .logo { z-index: 20; }

    .cover-face,
    .cover-inst,
    .cover-tiktok,
    .cover-google {
      z-index: 21;
    }

    .click-word { z-index: 22; }
    .call-word { z-index: 22; }
    .phone-art { z-index: 23; }

    .icon-face,
    .icon-inst,
    .icon-tiktok,
    .icon-google {
      z-index: 24;
      transition: transform .2s ease, filter .2s ease;
    }

    .icon-face.pop,
    .icon-inst.pop,
    .icon-tiktok.pop,
    .icon-google.pop,
    .phone-art.pop {
      animation: pop .28s ease;
    }

    /* hotspots invisibles */
    .hit {
      position: absolute;
      z-index: 50;
      display: block;
      border-radius: 999px;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    /* medidos desde tus PNG 1080x1920 */
    .hit-facebook  { left: 8.4%;  top: 35.8%; width: 38.5%; height: 6.9%; }
    .hit-instagram { left: 53.0%; top: 35.8%; width: 38.5%; height: 6.9%; }
    .hit-tiktok    { left: 8.4%;  top: 45.0%; width: 38.5%; height: 6.9%; }
    .hit-google    { left: 53.0%; top: 45.0%; width: 38.5%; height: 6.9%; }
    .hit-phone     { left: 6.2%;  top: 76.2%; width: 87.6%; height: 11.2%; border-radius: 20px; }

    @keyframes smokeA {
      0% { transform: translate3d(-1.1%, .9%, 0) scale(1.01); }
      50% { transform: translate3d(1.1%, -.8%, 0) scale(1.025); }
      100% { transform: translate3d(-.5%, -1.2%, 0) scale(1.015); }
    }
    @keyframes smokeB {
      0% { transform: translate3d(.9%, .8%, 0) scale(1.01); }
      50% { transform: translate3d(-1.2%, -.9%, 0) scale(1.022); }
      100% { transform: translate3d(.4%, -1.3%, 0) scale(1.014); }
    }
    @keyframes embers {
      0%,100% { filter: brightness(1) saturate(1); transform: scale(1); }
      50% { filter: brightness(1.1) saturate(1.08); transform: scale(1.008); }
    }
    @keyframes fireA {
      0% { transform: translateY(.5%) scale(1); filter: brightness(.98) saturate(1); }
      25% { transform: translateY(-.35%) scale(1.012); filter: brightness(1.08) saturate(1.05); }
      50% { transform: translateY(.2%) scale(.996); filter: brightness(1.02) saturate(1.02); }
      75% { transform: translateY(-.6%) scale(1.02); filter: brightness(1.14) saturate(1.09); }
      100% { transform: translateY(.35%) scale(1.004); filter: brightness(1.03) saturate(1.03); }
    }
    @keyframes fireB {
      0% { transform: translateY(.7%) scale(1); filter: brightness(1) saturate(1.05); }
      20% { transform: translateY(-.8%) scale(1.026); filter: brightness(1.18) saturate(1.13); }
      45% { transform: translateY(.3%) scale(.992); filter: brightness(1.03) saturate(1.03); }
      70% { transform: translateY(-1.05%) scale(1.033); filter: brightness(1.22) saturate(1.15); }
      100% { transform: translateY(.48%) scale(1.005); filter: brightness(1.04) saturate(1.04); }
    }
    @keyframes pop {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-7px) scale(1.08); }
      100% { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="poster">
    <img class="full bg" src="deys fondo copy.png" alt="Fondo" />
    <img class="full smoke-back" src="deys fondo copy2.png" alt="Humo" />
    <img class="full embers" src="deys fondo copy3.png" alt="Brasas" />
    <img class="full fire-mid" src="deys fondo copy4.png" alt="Fuego" />
    <img class="full fire-front" src="deys fondo copy5.png" alt="Llamas" />
    <img class="full smoke-front" src="deys fondo copy6.png" alt="Humo frontal" />
    <img class="full steak" src="deys fondo copy7.png" alt="Steak" />

    <img class="full logo" src="logo.png" alt="Dennys Grill" />

    <img class="full cover-face" src="cover_face.png" alt="Facebook cover" />
    <img class="full cover-inst" src="cover_inst.png" alt="Instagram cover" />
    <img class="full cover-tiktok" src="cover_tiktok.png" alt="TikTok cover" />
    <img class="full cover-google" src="cover_google.png" alt="Google cover" />

    <img class="full click-word" src="click.png" alt="Click" />
    <img class="full call-word" src="clicktocall.png" alt="Click to call us" />
    <img class="full phone-art" src="305.png" alt="305-431-7664" />

    <img class="full icon-face" src="face.png" alt="Facebook" />
    <img class="full icon-inst" src="inst.png" alt="Instagram" />
    <img class="full icon-tiktok" src="tiktok.png" alt="TikTok" />
    <img class="full icon-google" src="google.png" alt="Google" />

    <a class="hit hit-facebook" href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook"></a>
    <a class="hit hit-instagram" href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram"></a>
    <a class="hit hit-tiktok" href="https://tiktok.com" target="_blank" rel="noopener noreferrer" aria-label="TikTok"></a>
    <a class="hit hit-google" href="https://g.page" target="_blank" rel="noopener noreferrer" aria-label="Google"></a>
    <a class="hit hit-phone" href="tel:3054317664" aria-label="Llamar a Dennys Grill"></a>
  </main>

  <script>
    const map = {
      '.hit-facebook': '.icon-face',
      '.hit-instagram': '.icon-inst',
      '.hit-tiktok': '.icon-tiktok',
      '.hit-google': '.icon-google',
      '.hit-phone': '.phone-art'
    };

    Object.entries(map).forEach(([hitSel, imgSel]) => {
      const hit = document.querySelector(hitSel);
      const img = document.querySelector(imgSel);
      if (!hit || !img) return;
      hit.addEventListener('click', () => {
        img.classList.remove('pop');
        void img.offsetWidth;
        img.classList.add('pop');
      });
    });
  </script>
</body>
</html>
