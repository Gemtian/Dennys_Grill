<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dennys Grill</title>
  <style>
    :root {
      --poster-width: min(100vw, 430px);
      --poster-ratio: 9 / 16;
      --phone-link: tel:3054317664;

      /* ===== LOGO ===== */
      --logo-x: 50%;
      --logo-y: 1.5%;
      --logo-w: 68%;

      /* ===== SOCIAL COVERS ===== */
      --fb-cover-x: 8.3%;
      --fb-cover-y: 34.6%;
      --fb-cover-w: 36%;
      --ig-cover-x: 52.5%;
      --ig-cover-y: 34.6%;
      --ig-cover-w: 36%;
      --tt-cover-x: 8.3%;
      --tt-cover-y: 43.9%;
      --tt-cover-w: 36%;
      --gg-cover-x: 52.5%;
      --gg-cover-y: 43.9%;
      --gg-cover-w: 36%;

      /* ===== SOCIAL ICONS ===== */
      --icon-inset: 1.55%;
      --icon-size: 8.7%;
      --fb-icon-x: 9.85%;
      --fb-icon-y: 35.55%;
      --ig-icon-x: 78%;
      --ig-icon-y: 35.55%;
      --tt-icon-x: 9.85%;
      --tt-icon-y: 44.85%;
      --gg-icon-x: 78%;
      --gg-icon-y: 44.85%;

      /* ===== TEXTS ===== */
      --click-x: 50%;
      --click-y: 40.2%;
      --click-w: 15.5%;
      --call-x: 10.7%;
      --call-y: 75%;
      --call-w: 35.5%;
      --phone-x: 50%;
      --phone-y: 79.1%;
      --phone-w: 81.5%;

      /* ===== FIRE / SMOKE / FOOD ===== */
      --smoke-rear-x: 50%;
      --smoke-rear-y: 37.2%;
      --smoke-rear-w: 100%;
      --smoke-mid1-x: 50%;
      --smoke-mid1-y: 43.2%;
      --smoke-mid1-w: 100%;
      --smoke-mid2-x: 50%;
      --smoke-mid2-y: 47.2%;
      --smoke-mid2-w: 100%;
      --smoke-front-x: 50%;
      --smoke-front-y: 60.5%;
      --smoke-front-w: 100%;
      --flame-back-x: 50%;
      --flame-back-y: 56.8%;
      --flame-back-w: 100%;
      --flame-center-x: 50%;
      --flame-center-y: 58.9%;
      --flame-center-w: 100%;
      --flame-front-x: 50%;
      --flame-front-y: 80.9%;
      --flame-front-w: 100%;
      --meat-x: 50%;
      --meat-y: 25%;
      --meat-w: 102%;
      --carbon-x: 50%;
      --carbon-y:70%;
      --carbon-w: 102%;

      /* ===== HOTSPOTS ===== */
      --fb-hit-x: 8.3%;
      --fb-hit-y: 34.6%;
      --fb-hit-w: 39.2%;
      --fb-hit-h: 7.2%;
      --ig-hit-x: 52.5%;
      --ig-hit-y: 34.6%;
      --ig-hit-w: 39.2%;
      --ig-hit-h: 7.2%;
      --tt-hit-x: 8.3%;
      --tt-hit-y: 43.9%;
      --tt-hit-w: 39.2%;
      --tt-hit-h: 7.2%;
      --gg-hit-x: 52.5%;
      --gg-hit-y: 43.9%;
      --gg-hit-w: 39.2%;
      --gg-hit-h: 7.2%;
      --phone-hit-x: 9.3%;
      --phone-hit-y: 77.1%;
      --phone-hit-w: 81.3%;
      --phone-hit-h: 9.7%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .poster {
      position: relative;
      width: var(--poster-width);
      aspect-ratio: var(--poster-ratio);
      overflow: hidden;
      background: #171717;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      isolation: isolate;
    }

    .layer {
      position: absolute;
      display: block;
      max-width: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      transform-origin: center center;
    }

    .center-x {
      transform: translateX(-50%);
    }

    .bg {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .smoke-rear {
      left: var(--smoke-rear-x);
      top: var(--smoke-rear-y);
      width: var(--smoke-rear-w);
      z-index: 2;
      mix-blend-mode: screen;
      opacity: .28;
      animation: smokeRear 13s ease-in-out infinite alternate;
    }

    .flame-back {
      left: var(--flame-back-x);
      top: var(--flame-back-y);
      width: var(--flame-back-w);
      z-index: 3;
      mix-blend-mode: screen;
      opacity: .72;
      animation: flameBack 2.2s ease-in-out infinite alternate;
    }

    .flame-center {
      left: var(--flame-center-x);
      top: var(--flame-center-y);
      width: var(--flame-center-w);
      z-index: 4;
      mix-blend-mode: screen;
      opacity: .78;
      animation: flameCenter 1.8s ease-in-out infinite alternate;
    }

    .smoke-mid1 {
      left: var(--smoke-mid1-x);
      top: var(--smoke-mid1-y);
      width: var(--smoke-mid1-w);
      z-index: 5;
      mix-blend-mode: screen;
      opacity: .16;
      animation: smokeMid1 11s ease-in-out infinite alternate;
    }

    .smoke-mid2 {
      left: var(--smoke-mid2-x);
      top: var(--smoke-mid2-y);
      width: var(--smoke-mid2-w);
      z-index: 6;
      mix-blend-mode: screen;
      opacity: .14;
      animation: smokeMid2 9s ease-in-out infinite alternate;
    }

    .flame-front {
      left: var(--flame-front-x);
      top: var(--flame-front-y);
      width: var(--flame-front-w);
      z-index: 7;
      mix-blend-mode: screen;
      opacity: .96;
      animation: flameFront 1.25s ease-in-out infinite alternate;
    }

    .smoke-front {
      left: var(--smoke-front-x);
      top: var(--smoke-front-y);
      width: var(--smoke-front-w);
      z-index: 8;
      mix-blend-mode: screen;
      opacity: .18;
      animation: smokeFront 8s ease-in-out infinite alternate;
    }

    .carbon {
      left: var(--carbon-x);
      top: var(--carbon-y);
      width: var(--carbon-w);
      z-index: 9;
      mix-blend-mode: screen;
      opacity: .98;
    }

    .meat {
      left: var(--meat-x);
      top: var(--meat-y);
      width: var(--meat-w);
      z-index: 10;
    }

    .logo {
      left: var(--logo-x);
      top: var(--logo-y);
      width: var(--logo-w);
      z-index: 20;
    }

    .cover-fb {
      left: var(--fb-cover-x);
      top: var(--fb-cover-y);
      width: var(--fb-cover-w);
      z-index: 21;
    }

    .cover-ig {
      left: var(--ig-cover-x);
      top: var(--ig-cover-y);
      width: var(--ig-cover-w);
      z-index: 21;
    }

    .cover-tt {
      left: var(--tt-cover-x);
      top: var(--tt-cover-y);
      width: var(--tt-cover-w);
      z-index: 21;
    }

    .cover-gg {
      left: var(--gg-cover-x);
      top: var(--gg-cover-y);
      width: var(--gg-cover-w);
      z-index: 21;
    }

    .icon-fb {
      left: var(--fb-icon-x);
      top: var(--fb-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .icon-ig {
      left: var(--ig-icon-x);
      top: var(--ig-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .icon-tt {
      left: var(--tt-icon-x);
      top: var(--tt-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .icon-gg {
      left: var(--gg-icon-x);
      top: var(--gg-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .click-word {
      left: var(--click-x);
      top: var(--click-y);
      width: var(--click-w);
      z-index: 23;
    }

    .call-word {
      left: var(--call-x);
      top: var(--call-y);
      width: var(--call-w);
      z-index: 23;
    }

    .phone-art {
      left: var(--phone-x);
      top: var(--phone-y);
      width: var(--phone-w);
      z-index: 24;
    }

    .hotspot {
      position: absolute;
      z-index: 50;
      display: block;
      border-radius: 999px;
      background: transparent;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .hotspot-fb {
      left: var(--fb-hit-x);
      top: var(--fb-hit-y);
      width: var(--fb-hit-w);
      height: var(--fb-hit-h);
    }

    .hotspot-ig {
      left: var(--ig-hit-x);
      top: var(--ig-hit-y);
      width: var(--ig-hit-w);
      height: var(--ig-hit-h);
    }

    .hotspot-tt {
      left: var(--tt-hit-x);
      top: var(--tt-hit-y);
      width: var(--tt-hit-w);
      height: var(--tt-hit-h);
    }

    .hotspot-gg {
      left: var(--gg-hit-x);
      top: var(--gg-hit-y);
      width: var(--gg-hit-w);
      height: var(--gg-hit-h);
    }

    .hotspot-phone {
      left: var(--phone-hit-x);
      top: var(--phone-hit-y);
      width: var(--phone-hit-w);
      height: var(--phone-hit-h);
      border-radius: 24px;
    }

    .pop {
      animation: pop .34s ease;
    }

    .note {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.75);
      color: #fff;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      white-space: nowrap;
    }

    .note.show {
      opacity: 1;
    }

    @keyframes smokeRear {
      0%   { transform: translateX(-50%) translateY(0) scale(1); }
      50%  { transform: translateX(-50%) translateY(-1.2%) scale(1.02); }
      100% { transform: translateX(-50%) translateY(-2.1%) scale(1.03); }
    }

    @keyframes smokeMid1 {
      0%   { transform: translateX(-50%) translateY(0) translateX(-.3%) scale(1); }
      50%  { transform: translateX(-50%) translateY(-1.6%) translateX(.4%) scale(1.02); }
      100% { transform: translateX(-50%) translateY(-2.8%) translateX(-.2%) scale(1.03); }
    }

    @keyframes smokeMid2 {
      0%   { transform: translateX(-50%) translateY(0) translateX(.25%) scale(1); }
      50%  { transform: translateX(-50%) translateY(-1.3%) translateX(-.45%) scale(1.018); }
      100% { transform: translateX(-50%) translateY(-2.4%) translateX(.15%) scale(1.028); }
    }

    @keyframes smokeFront {
      0%   { transform: translateX(-50%) translateY(0) scale(1); }
      50%  { transform: translateX(-50%) translateY(-1.1%) scale(1.015); }
      100% { transform: translateX(-50%) translateY(-2%) scale(1.022); }
    }

    @keyframes flameBack {
      0%   { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(.95) saturate(1); }
      50%  { transform: translateX(-50%) translateY(-.45%) scale(1.02); filter: brightness(1.08) saturate(1.08); }
      100% { transform: translateX(-50%) translateY(.25%) scale(1.01); filter: brightness(1.02) saturate(1.04); }
    }

    @keyframes flameCenter {
      0%   { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(.98) saturate(1.02); }
      50%  { transform: translateX(-50%) translateY(-.7%) scale(1.025); filter: brightness(1.12) saturate(1.12); }
      100% { transform: translateX(-50%) translateY(.3%) scale(1.012); filter: brightness(1.03) saturate(1.06); }
    }

    @keyframes flameFront {
      0%   { transform: translateX(-50%) translateY(0) scale(1); filter: brightness(1) saturate(1.04); }
      50%  { transform: translateX(-50%) translateY(-.9%) scale(1.03); filter: brightness(1.2) saturate(1.16); }
      100% { transform: translateX(-50%) translateY(.3%) scale(1.012); filter: brightness(1.05) saturate(1.08); }
    }

    @keyframes pop {
      0%   { transform: translateY(0) scale(1); }
      50%  { transform: translateY(-7px) scale(1.08); }
      100% { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="poster">
    <img class="layer bg" src="background-bricks.png" alt="Background bricks" />

    <img class="layer smoke-rear center-x" src="smoke_rear.png" alt="Smoke rear" />
    <img class="layer flame-back center-x" src="flame_back.png" alt="Flame back" />
    <img class="layer flame-center center-x" src="flame_center.png" alt="Flame center" />
    <img class="layer smoke-mid1 center-x" src="smoke_mid1.png" alt="Smoke mid 1" />
    <img class="layer smoke-mid2 center-x" src="smoke_mid2.png" alt="Smoke mid 2" />
    <img class="layer flame-front center-x" src="flame_front.png" alt="Flame front" />
    <img class="layer smoke-front center-x" src="smoke_front.png" alt="Smoke front" />
    <img class="layer meat center-x" src="meat.png" alt="Meat" />
    <img class="layer carbon center-x" src="carbon.png" alt="Carbon" />

    <img class="layer logo center-x" src="logo.png" alt="Logo" />

    <img class="layer cover-fb" src="cover_face.png" alt="Facebook cover" />
    <img class="layer cover-ig" src="cover_inst.png" alt="Instagram cover" />
    <img class="layer cover-tt" src="cover_tiktok.png" alt="TikTok cover" />
    <img class="layer cover-gg" src="cover_google.png" alt="Google cover" />

    <img class="layer icon-fb" src="face.png" alt="Facebook" />
    <img class="layer icon-ig" src="inst.png" alt="Instagram" />
    <img class="layer icon-tt" src="tiktok.png" alt="TikTok" />
    <img class="layer icon-gg" src="google.png" alt="Google" />

    <img class="layer click-word center-x" src="click.png" alt="Click" />
    <img class="layer call-word" src="clicktocall.png" alt="Click to call us" />
    <img class="layer phone-art center-x" src="305.png" alt="305-431-7664" />

    <a class="hotspot hotspot-fb" data-type="facebook" data-link="" aria-label="Facebook"></a>
    <a class="hotspot hotspot-ig" data-type="instagram" data-link="" aria-label="Instagram"></a>
    <a class="hotspot hotspot-tt" data-type="tiktok" data-link="" aria-label="TikTok"></a>
    <a class="hotspot hotspot-gg" data-type="google" data-link="" aria-label="Google"></a>
    <a class="hotspot hotspot-phone" href="tel:3054317664" data-type="phone" aria-label="Phone"></a>
  </main>

  <div class="note" id="note">Añade el link después.</div>

  <script>
    const note = document.getElementById('note');
    let timer;

    function showNote(text) {
      note.textContent = text;
      note.classList.add('show');
      clearTimeout(timer);
      timer = setTimeout(() => note.classList.remove('show'), 1500);
    }

    function pop(selector) {
      const el = document.querySelector(selector);
      if (!el) return;
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }

    const iconMap = {
      facebook: '.icon-fb',
      instagram: '.icon-ig',
      tiktok: '.icon-tt',
      google: '.icon-gg',
      phone: '.phone-art'
    };

    document.querySelectorAll('.hotspot').forEach(h => {
      h.addEventListener('click', (e) => {
        const type = h.dataset.type;
        pop(iconMap[type]);

        if (type === 'phone') return;

        const link = h.dataset.link.trim();
        if (!link) {
          e.preventDefault();
          showNote('Aquí añades el link de ' + type + '.');
          return;
        }

        h.href = link;
        h.target = '_blank';
        h.rel = 'noopener noreferrer';
      });
    });
  </script>
</body>
</html>
