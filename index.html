<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dennys Grill</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #0d0d0d; }
    body { display: grid; place-items: center; padding: 10px; font-family: Arial, Helvetica, sans-serif; }

    .poster {
      position: relative;
      width: min(100vw, 430px);
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: #111;
      box-shadow: 0 20px 56px rgba(0,0,0,.48);
      isolation: isolate;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .fx {
      position: absolute;
      left: 0;
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Capas colocadas abajo para evitar el gris/blank arriba */
    .smoke-back {
      z-index: 2;
      top: 31%;
      opacity: .58;
      mix-blend-mode: multiply;
      animation: smokeA 11s ease-in-out infinite alternate;
    }

    .embers {
      z-index: 3;
      top: 79%;
      opacity: .98;
      mix-blend-mode: screen;
      animation: emberGlow 3s ease-in-out infinite;
    }

    .fire-mid {
      z-index: 4;
      top: 60%;
      opacity: .9;
      mix-blend-mode: multiply;
      animation: fireA 1.9s ease-in-out infinite alternate;
    }

    .fire-front {
      z-index: 5;
      top: 78%;
      opacity: .98;
      mix-blend-mode: screen;
      animation: fireB 1.2s ease-in-out infinite alternate;
    }

    .smoke-front {
      z-index: 6;
      top: 56%;
      opacity: .64;
      mix-blend-mode: screen;
      animation: smokeB 8.5s ease-in-out infinite alternate;
    }

    .steak {
      z-index: 7;
      top: 53%;
    }

    /* overlays recortados por bbox */
    .logo {
      position: absolute;
      left: 16.1%;
      top: 1.4%;
      width: 67.5%;
      z-index: 20;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
      pointer-events: none;
    }

    .cover, .icon, .click-word, .call-word, .phone-art {
      position: absolute;
      display: block;
      z-index: 21;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .cover-inst { left: 52.9%; top: 36.1%; width: 38.5%; }
    .cover-tiktok { left: 8.4%; top: 46.4%; width: 38.5%; }
    .cover-google { left: 52.9%; top: 46.4%; width: 38.5%; }

    /* Facebook faltaba en tus archivos: lo genero por CSS para que aparezca completo */
    .cover-facebook {
      position: absolute;
      left: 8.4%;
      top: 36.1%;
      width: 38.5%;
      height: 6.8%;
      border: 3px solid rgba(255,255,255,.92);
      border-radius: 999px;
      z-index: 21;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .icon-inst { left: 80.6%; top: 37.0%; width: 9.0%; z-index: 24; }
    .icon-tiktok { left: 9.9%; top: 47.2%; width: 9.0%; z-index: 24; }
    .icon-google { left: 80.6%; top: 47.2%; width: 9.0%; z-index: 24; }

    .icon-facebook {
      position: absolute;
      left: 9.9%;
      top: 37.0%;
      width: 9.0%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      color: #6b412f;
      z-index: 24;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(28px, 3.9vw, 40px);
      line-height: 1;
      pointer-events: none;
      text-transform: lowercase;
    }

    .click-word { left: 42.8%; top: 43.5%; width: 14.3%; z-index: 22; }
    .call-word { left: 10.6%; top: 75.8%; width: 36%; z-index: 22; }
    .phone-art { left: 7.0%; top: 79.0%; width: 83%; z-index: 23; }

    .hit {
      position: absolute;
      z-index: 50;
      display: block;
      background: transparent;
      border-radius: 999px;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .hit-facebook  { left: 8.4%;  top: 36.1%; width: 38.5%; height: 6.8%; }
    .hit-instagram { left: 52.9%; top: 36.1%; width: 38.5%; height: 6.8%; }
    .hit-tiktok    { left: 8.4%;  top: 46.4%; width: 38.5%; height: 6.8%; }
    .hit-google    { left: 52.9%; top: 46.4%; width: 38.5%; height: 6.8%; }
    .hit-phone     { left: 7.0%;  top: 79.0%; width: 83%; height: 8.7%; border-radius: 20px; }

    .pop { animation: pop .28s ease; }

    @keyframes smokeA {
      0% { transform: translate3d(-1.2%, .8%, 0) scale(1.01); }
      50% { transform: translate3d(1.2%, -.8%, 0) scale(1.025); }
      100% { transform: translate3d(-.4%, -1.2%, 0) scale(1.015); }
    }
    @keyframes smokeB {
      0% { transform: translate3d(.8%, .6%, 0) scale(1.01); }
      50% { transform: translate3d(-1.1%, -.8%, 0) scale(1.02); }
      100% { transform: translate3d(.4%, -1.1%, 0) scale(1.014); }
    }
    @keyframes emberGlow {
      0%,100% { transform: scale(1); filter: brightness(1) saturate(1); }
      50% { transform: scale(1.01); filter: brightness(1.12) saturate(1.08); }
    }
    @keyframes fireA {
      0% { transform: translateY(.6%) scale(1); filter: brightness(.98) saturate(1); }
      50% { transform: translateY(-.5%) scale(1.016); filter: brightness(1.12) saturate(1.08); }
      100% { transform: translateY(.35%) scale(1.004); filter: brightness(1.03) saturate(1.03); }
    }
    @keyframes fireB {
      0% { transform: translateY(.7%) scale(1); filter: brightness(1) saturate(1.04); }
      50% { transform: translateY(-1%) scale(1.03); filter: brightness(1.2) saturate(1.14); }
      100% { transform: translateY(.45%) scale(1.006); filter: brightness(1.04) saturate(1.04); }
    }
    @keyframes pop {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-7px) scale(1.08); }
      100% { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="poster">
    <img class="bg" src="deys fondo copy.png" alt="Fondo ladrillo" />

    <img class="fx smoke-back" src="deys fondo copy2.png" alt="Humo" />
    <img class="fx embers" src="deys fondo copy3.png" alt="Carbón" />
    <img class="fx fire-mid" src="deys fondo copy4.png" alt="Llama" />
    <img class="fx fire-front" src="deys fondo copy5.png" alt="Fuego frontal" />
    <img class="fx smoke-front" src="deys fondo copy6.png" alt="Humo frontal" />
    <img class="fx steak" src="deys fondo copy7.png" alt="Steak" />

    <img class="logo" src="logo.png" alt="Dennys Grill" />

    <div class="cover-facebook"></div>
    <img class="cover cover-inst" src="cover_inst.png" alt="Instagram cover" />
    <img class="cover cover-tiktok" src="cover_tiktok.png" alt="TikTok cover" />
    <img class="cover cover-google" src="cover_google.png" alt="Google cover" />

    <div class="icon-facebook" id="fbicon">f</div>
    <img class="icon icon-inst" id="igicon" src="inst.png" alt="Instagram" />
    <img class="icon icon-tiktok" id="tkicon" src="tiktok.png" alt="TikTok" />
    <img class="icon icon-google" id="ggicon" src="google.png" alt="Google" />

    <img class="click-word" src="click.png" alt="Click" />
    <img class="call-word" src="clicktocall.png" alt="Click to call us" />
    <img class="phone-art" id="phoneart" src="305.png" alt="305-431-7664" />

    <a class="hit hit-facebook" href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook"></a>
    <a class="hit hit-instagram" href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram"></a>
    <a class="hit hit-tiktok" href="https://tiktok.com" target="_blank" rel="noopener noreferrer" aria-label="TikTok"></a>
    <a class="hit hit-google" href="https://g.page" target="_blank" rel="noopener noreferrer" aria-label="Google"></a>
    <a class="hit hit-phone" href="tel:3054317664" aria-label="Llamar a Dennys Grill"></a>
  </main>

  <script>
    const map = {
      '.hit-facebook': '#fbicon',
      '.hit-instagram': '#igicon',
      '.hit-tiktok': '#tkicon',
      '.hit-google': '#ggicon',
      '.hit-phone': '#phoneart'
    };

    Object.entries(map).forEach(([hitSel, targetSel]) => {
      const hit = document.querySelector(hitSel);
      const target = document.querySelector(targetSel);
      if (!hit || !target) return;
      hit.addEventListener('click', () => {
        target.classList.remove('pop');
        void target.offsetWidth;
        target.classList.add('pop');
      });
    });
  </script>
</body>
</html>
