<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dennys Grill</title>
  <style>
    :root {
      --poster-width: min(100vw, 430px);
      --poster-ratio: 9 / 16;

      /* ===== LOGO ===== */
      --logo-x: 50%;
      --logo-y: 1.6%;
      --logo-w: 72%;

      /* ===== SOCIAL COVERS ===== */
      --fb-cover-x: 8.3%;
      --fb-cover-y: 37.3%;
      --fb-cover-w: 36%;

      --ig-cover-x: 56%;
      --ig-cover-y: 37.3%;
      --ig-cover-w: 36%;

      --tt-cover-x: 8.3%;
      --tt-cover-y: 44.5%;
      --tt-cover-w: 36%;

      --gg-cover-x: 56%;
      --gg-cover-y: 44.5%;
      --gg-cover-w: 36%;

      /* ===== SOCIAL ICONS ===== */
      --icon-size: 8.7%;
      --fb-icon-x: 10%;
      --fb-icon-y: 38.2%;

      --ig-icon-x: 82%;
      --ig-icon-y: 38.2%;

      --tt-icon-x: 10%;
      --tt-icon-y: 45.3%;

      --gg-icon-x: 82%;
      --gg-icon-y: 45.3%;

      /* ===== TEXTS ===== */
      --click-x: 50%;
      --click-y: 43%;
      --click-w: 10%;

      --call-x: 10.7%;
      --call-y: 72%;
      --call-w: 35.5%;

      --phone-x: 50%;
      --phone-y: 75.5%;
      --phone-w: 81.5%;

      /* ===== PSD LAYERS ORDER / POSITIONS ===== */
      --humo-x: 50%;
      --humo-y: 40%;
      --humo-w: 100%;

      --carbon-x: 50%;
      --carbon-y: 71%;
      --carbon-w: 105%;

      --flame1-x: 50%;
      --flame1-y: 70%;
      --flame1-w: 100%;

      --flame2-x: 50%;
      --flame2-y: 42%;
      --flame2-w: 100%;

      --smoke1-x: 50%;
      --smoke1-y: 60%;
      --smoke1-w: 100%;

      --smoke2-x: 50%;
      --smoke2-y: 58%;
      --smoke2-w: 100%;

      --smoke3-x: 50%;
      --smoke3-y: 56%;
      --smoke3-w: 100%;

      --smoke4-x: 50%;
      --smoke4-y: 54%;
      --smoke4-w: 100%;

      --meat-x: 50%;
      --meat-y: 30%;
      --meat-w: 100%;

      /* ===== HOTSPOTS ===== */
      --fb-hit-x: 8.3%;
      --fb-hit-y: 34.6%;
      --fb-hit-w: 39.2%;
      --fb-hit-h: 7.2%;

      --ig-hit-x: 52.5%;
      --ig-hit-y: 34.6%;
      --ig-hit-w: 39.2%;
      --ig-hit-h: 7.2%;

      --tt-hit-x: 8.3%;
      --tt-hit-y: 43.9%;
      --tt-hit-w: 39.2%;
      --tt-hit-h: 7.2%;

      --gg-hit-x: 52.5%;
      --gg-hit-y: 43.9%;
      --gg-hit-w: 39.2%;
      --gg-hit-h: 7.2%;

      --phone-hit-x: 9.3%;
      --phone-hit-y: 77.1%;
      --phone-hit-w: 81.3%;
      --phone-hit-h: 9.7%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .poster {
      position: relative;
      width: var(--poster-width);
      aspect-ratio: var(--poster-ratio);
      overflow: hidden;
      background: #171717;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      isolation: isolate;
    }

    .layer {
      position: absolute;
      display: block;
      max-width: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      transform-origin: center center;
    }

    .center-x {
      transform: translateX(-50%);
    }

    .bg {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* ===== PSD ORDER EXACTO ===== */
    .humo {
      left: var(--humo-x);
      top: var(--humo-y);
      width: var(--humo-w);
      z-index: 2;
      opacity: .35;
      mix-blend-mode: screen;
    }

    .carbon {
      left: var(--carbon-x);
      top: var(--carbon-y);
      width: var(--carbon-w);
      z-index: 3;
      opacity: 1;
    }

    .flame1 {
      left: var(--flame1-x);
      top: var(--flame1-y);
      width: var(--flame1-w);
      z-index: 4;
      mix-blend-mode: screen;
      opacity: .9;
      animation: fuego1 2s ease-in-out infinite alternate;
    }

    .flame2 {
      left: var(--flame2-x);
      top: var(--flame2-y);
      width: var(--flame2-w);
      z-index: 5;
      mix-blend-mode: screen;
      opacity: .50;
      animation: fuego2 1.6s ease-in-out infinite alternate;
    }

    .smoke1 {
      left: var(--smoke1-x);
      top: var(--smoke1-y);
      width: var(--smoke1-w);
      z-index: 6;
      opacity: .18;
      mix-blend-mode: screen;
      animation: smokeA 9s ease-in-out infinite alternate;
    }

    .smoke2 {
      left: var(--smoke2-x);
      top: var(--smoke2-y);
      width: var(--smoke2-w);
      z-index: 7;
      opacity: .16;
      mix-blend-mode: screen;
      animation: smokeB 10s ease-in-out infinite alternate;
    }

    .smoke3 {
      left: var(--smoke3-x);
      top: var(--smoke3-y);
      width: var(--smoke3-w);
      z-index: 8;
      opacity: .14;
      mix-blend-mode: screen;
      animation: smokeC 11s ease-in-out infinite alternate;
    }

    .smoke4 {
      left: var(--smoke4-x);
      top: var(--smoke4-y);
      width: var(--smoke4-w);
      z-index: 9;
      opacity: .12;
      mix-blend-mode: screen;
      animation: smokeD 12s ease-in-out infinite alternate;
    }

    .meat {
      left: var(--meat-x);
      top: var(--meat-y);
      width: var(--meat-w);
      z-index: 10;
    }

    .logo {
      left: var(--logo-x);
      top: var(--logo-y);
      width: var(--logo-w);
      z-index: 20;
    }

    .cover-fb {
      left: var(--fb-cover-x);
      top: var(--fb-cover-y);
      width: var(--fb-cover-w);
      z-index: 21;
    }

    .cover-ig {
      left: var(--ig-cover-x);
      top: var(--ig-cover-y);
      width: var(--ig-cover-w);
      z-index: 21;
    }

    .cover-tt {
      left: var(--tt-cover-x);
      top: var(--tt-cover-y);
      width: var(--tt-cover-w);
      z-index: 21;
    }

    .cover-gg {
      left: var(--gg-cover-x);
      top: var(--gg-cover-y);
      width: var(--gg-cover-w);
      z-index: 21;
    }

    .icon-fb {
      left: var(--fb-icon-x);
      top: var(--fb-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .icon-ig {
      left: var(--ig-icon-x);
      top: var(--ig-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .icon-tt {
      left: var(--tt-icon-x);
      top: var(--tt-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .icon-gg {
      left: var(--gg-icon-x);
      top: var(--gg-icon-y);
      width: var(--icon-size);
      z-index: 22;
    }

    .click-word {
      left: var(--click-x);
      top: var(--click-y);
      width: var(--click-w);
      z-index: 23;
    }

    .call-word {
      left: var(--call-x);
      top: var(--call-y);
      width: var(--call-w);
      z-index: 23;
    }

    .phone-art {
      left: var(--phone-x);
      top: var(--phone-y);
      width: var(--phone-w);
      z-index: 24;
    }

    .hotspot {
      position: absolute;
      z-index: 50;
      display: block;
      border-radius: 999px;
      background: transparent;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .hotspot-fb {
      left: var(--fb-hit-x);
      top: var(--fb-hit-y);
      width: var(--fb-hit-w);
      height: var(--fb-hit-h);
    }

    .hotspot-ig {
      left: var(--ig-hit-x);
      top: var(--ig-hit-y);
      width: var(--ig-hit-w);
      height: var(--ig-hit-h);
    }

    .hotspot-tt {
      left: var(--tt-hit-x);
      top: var(--tt-hit-y);
      width: var(--tt-hit-w);
      height: var(--tt-hit-h);
    }

    .hotspot-gg {
      left: var(--gg-hit-x);
      top: var(--gg-hit-y);
      width: var(--gg-hit-w);
      height: var(--gg-hit-h);
    }

    .hotspot-phone {
      left: var(--phone-hit-x);
      top: var(--phone-hit-y);
      width: var(--phone-hit-w);
      height: var(--phone-hit-h);
      border-radius: 24px;
    }

    .pop {
      animation: pop .34s ease;
    }

    .note {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.75);
      color: #fff;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      white-space: nowrap;
    }

    .note.show {
      opacity: 1;
    }

    @keyframes fuego1 {
      0%   { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.06); }
    }

    @keyframes fuego2 {
      0%   { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.08); }
    }

    @keyframes smokeA {
      0%   { transform: translateX(-50%) translateY(0); }
      100% { transform: translateX(-50%) translateY(-8px); }
    }

    @keyframes smokeB {
      0%   { transform: translateX(-50%) translateY(0); }
      100% { transform: translateX(-50%) translateY(-12px); }
    }

    @keyframes smokeC {
      0%   { transform: translateX(-50%) translateY(0); }
      100% { transform: translateX(-50%) translateY(-16px); }
    }

    @keyframes smokeD {
      0%   { transform: translateX(-50%) translateY(0); }
      100% { transform: translateX(-50%) translateY(-20px); }
    }

    @keyframes pop {
      0%   { transform: translateY(0) scale(1); }
      50%  { transform: translateY(-7px) scale(1.08); }
      100% { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="poster">
    <!-- PSD order exacto -->
    <img class="layer bg" src="background-bricks.png" alt="Background bricks" />

    <img class="layer humo center-x" src="humo.png" alt="Humo" />

    <img class="layer carbon center-x" src="carbon.png" alt="Carbon" />

    <img class="layer flame1 center-x" src="flame1.png" alt="Flame 1" />
    <img class="layer flame2 center-x" src="flame2.png" alt="Flame 2" />

    <img class="layer smoke1 center-x" src="smoke1.png" alt="Smoke 1" />
    <img class="layer smoke2 center-x" src="smoke2.png" alt="Smoke 2" />
    <img class="layer smoke3 center-x" src="smoke3.png" alt="Smoke 3" />
    <img class="layer smoke4 center-x" src="smoke4.png" alt="Smoke 4" />

    <img class="layer meat center-x" src="meat.png" alt="Meat" />

    <img class="layer logo center-x" src="logo.png" alt="Logo" />

    <img class="layer cover-fb" src="cover_face.png" alt="Facebook cover" />
    <img class="layer cover-ig" src="cover_inst.png" alt="Instagram cover" />
    <img class="layer cover-tt" src="cover_tiktok.png" alt="TikTok cover" />
    <img class="layer cover-gg" src="cover_google.png" alt="Google cover" />

    <img class="layer icon-fb" src="face.png" alt="Facebook" />
    <img class="layer icon-ig" src="inst.png" alt="Instagram" />
    <img class="layer icon-tt" src="tiktok.png" alt="TikTok" />
    <img class="layer icon-gg" src="google.png" alt="Google" />

    <img class="layer click-word center-x" src="click.png" alt="Click" />
    <img class="layer call-word" src="clicktocall.png" alt="Click to call us" />
    <img class="layer phone-art center-x" src="305.png" alt="305-431-7664" />

    <a class="hotspot hotspot-fb" data-type="facebook" data-link="" aria-label="Facebook"></a>
    <a class="hotspot hotspot-ig" data-type="instagram" data-link="" aria-label="Instagram"></a>
    <a class="hotspot hotspot-tt" data-type="tiktok" data-link="" aria-label="TikTok"></a>
    <a class="hotspot hotspot-gg" data-type="google" data-link="" aria-label="Google"></a>
    <a class="hotspot hotspot-phone" href="tel:3054317664" data-type="phone" aria-label="Phone"></a>
  </main>

  <div class="note" id="note">Añade el link después.</div>

  <script>
    const note = document.getElementById('note');
    let timer;

    function showNote(text) {
      note.textContent = text;
      note.classList.add('show');
      clearTimeout(timer);
      timer = setTimeout(() => note.classList.remove('show'), 1500);
    }

    function pop(selector) {
      const el = document.querySelector(selector);
      if (!el) return;
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }

    const iconMap = {
      facebook: '.icon-fb',
      instagram: '.icon-ig',
      tiktok: '.icon-tt',
      google: '.icon-gg',
      phone: '.phone-art'
    };

    document.querySelectorAll('.hotspot').forEach(h => {
      h.addEventListener('click', (e) => {
        const type = h.dataset.type;
        pop(iconMap[type]);

        if (type === 'phone') return;

        const link = (h.dataset.link || '').trim();
        if (!link) {
          e.preventDefault();
          showNote('Aquí añades el link de ' + type + '.');
          return;
        }

        h.href = link;
        h.target = '_blank';
        h.rel = 'noopener noreferrer';
      });
    });
  </script>
</body>
</html>
